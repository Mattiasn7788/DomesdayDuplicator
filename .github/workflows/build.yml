name: Compact Windows Build
on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-serialport
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-libvpl
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-flac
            make
      - name: Build & Package
        shell: msys2 {0}
        run: |
          mkdir -p build && cd build
          cmake .. -G "MSYS Makefiles" -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

          # 1. Isolate the EXE
          EXE_PATH=$(find . -name "DomesdayDuplicator.exe")
          cp "$EXE_PATH" .

          # 2. Run windeployqt
          windeployqt --release --no-translations --no-opengl-sw --no-system-d3d-compiler DomesdayDuplicator.exe

          # 3. Copy ALL dependencies (Hardware/Processing/Missing)
          # FFmpeg/Hardware Acceleration
          cp /ucrt64/bin/avcodec-*.dll .
          cp /ucrt64/bin/avutil-*.dll .
          cp /ucrt64/bin/swresample-*.dll .
          cp /ucrt64/bin/swscale-*.dll .
          cp /ucrt64/bin/libva*.dll .
          cp /ucrt64/bin/libvpl*.dll .
          cp /ucrt64/bin/libsoxr.dll .
          
          # Core Systems & Hardware
          cp /ucrt64/bin/libusb-1.0.dll .
          cp /ucrt64/bin/libgomp-1.dll .
          cp /ucrt64/bin/zlib1.dll .
          cp /ucrt64/bin/libgcc_s_seh-1.dll .
          cp /ucrt64/bin/libstdc++-6.dll .
          cp /ucrt64/bin/libwinpthread-1.dll .
          
          # Qt6 Internal requirements
          cp /ucrt64/bin/libicu*.dll .
          cp /ucrt64/bin/libdouble-conversion.dll .
          cp /ucrt64/bin/libb2-1.dll .
          cp /ucrt64/bin/libpcre2-16-0.dll .

          # 4. FINAL CLEANUP: Only keep 'platforms' and 'styles' folders
          find . -maxdepth 1 -type d ! -name 'platforms' ! -name 'styles' ! -path "." -exec rm -rf {} +
          rm -f dddconv.exe dddutil.exe

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: DomesdayDuplicator-Compact-Windows
          path: build/
