name: Cross-Platform Build
on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-serialport
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-flac
            make

      - name: Build & Package
        shell: msys2 {0}
        run: |
          mkdir -p build && cd build
          ar rcs /ucrt64/lib/libdl.a
          cmake .. -G "MSYS Makefiles" -DBUILD_SHARED_LIBS=OFF
          make
          windeployqt --no-translations --no-opengl-sw DomesdayDuplicator.exe
          cp /ucrt64/bin/*.dll .
          rm -f dddconv.exe dddutil.exe

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: DomesdayDuplicator-Windows
          path: build/
