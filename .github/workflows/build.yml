name: Compact Windows Build
on: [push, pull_request]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-serialport
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-libvpl
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-flac
            make
      - name: Build & Package
        shell: msys2 {0}
        run: |
          mkdir -p build && cd build
          # FORCE CMake to use the static (.a) files for zlib and libusb
          cmake .. -G "MSYS Makefiles" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++ -Wl,-Bstatic -lwinpthread -Wl,-Bdynamic -lbcrypt -ladvapi32" \
            -DZLIB_LIBRARY=/ucrt64/lib/libz.a \
            -DLIBUSB_1_LIBRARY=/ucrt64/lib/libusb-1.0.a
          make -j$(nproc)
          
          # 1. Isolate the EXE (Should be ~4340kb now)
          EXE_PATH=$(find . -name "DomesdayDuplicator.exe")
          cp "$EXE_PATH" .
          
          # 2. Run windeployqt
          windeployqt --release --no-translations --no-opengl-sw --no-system-d3d-compiler DomesdayDuplicator.exe
          
          # 3. Copy remaining dynamic dependencies
          ldd DomesdayDuplicator.exe | grep /ucrt64 | awk '{print $3}' | xargs -I {} cp -n {} .
          
          # Manually grab FFmpeg and hardware acceleration
          cp /ucrt64/bin/avcodec-*.dll .
          cp /ucrt64/bin/avutil-*.dll .
          cp /ucrt64/bin/swresample-*.dll .
          cp /ucrt64/bin/swscale-*.dll .
          cp /ucrt64/bin/libva*.dll .
          cp /ucrt64/bin/libvpl*.dll .
          cp /ucrt64/bin/libicu*.dll .
          
          # 4. FINAL CLEANUP: Remove files now merged into the EXE
          rm -f libusb-1.0.dll zlib1.dll libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll
          
          # Remove build leftovers
          find . -maxdepth 1 -type d ! -name 'platforms' ! -name 'styles' ! -path "." -exec rm -rf {} +
          rm -f dddconv.exe dddutil.exe
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: DomesdayDuplicator-Compact-Windows
          path: build/
