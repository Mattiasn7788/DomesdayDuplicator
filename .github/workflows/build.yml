name: Compact Windows Build

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-serialport
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-flac
            mingw-w64-ucrt-x86_64-libsoxr
            zip
            make

      - name: Build & Package (Safe Mode)
        shell: msys2 {0}
        run: |
          mkdir -p build && cd build

          # Build with basic static linking
          cmake .. -G "MSYS Makefiles" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++ -Wl,-Bstatic -lwinpthread -lz -Wl,-Bdynamic" \
            -DZLIB_LIBRARY=/ucrt64/lib/libz.a \
            -DLIBUSB_1_LIBRARY=/ucrt64/lib/libusb-1.0.a

          make -j$(nproc)

          # Copy the executable
          EXE_PATH=$(find . -name "DomesdayDuplicator.exe" | head -n1)
          if [ -z "$EXE_PATH" ]; then
            echo "Error: DomesdayDuplicator.exe not found!"
            exit 1
          fi
          cp "$EXE_PATH" DomesdayDuplicator.exe

          # Deploy Qt files
          windeployqt6 --release --no-translations --no-opengl-sw --no-system-d3d-compiler DomesdayDuplicator.exe

          # === MOST IMPORTANT PART: Copy ALL required DLLs ===
          echo "=== Copying all dependencies using ldd ==="
          ldd DomesdayDuplicator.exe | grep -E '/ucrt64/' | awk '{print $3}' | xargs -I {} cp -n "{}" . || true

          # Extra copies for safety (FFmpeg audio + USB)
          cp -n /ucrt64/bin/avutil-*.dll      . 2>/dev/null || true
          cp -n /ucrt64/bin/swresample-*.dll  . 2>/dev/null || true
          cp -n /ucrt64/bin/swscale-*.dll     . 2>/dev/null || true

          # Qt platform plugins
          mkdir -p platforms styles
          cp -n /ucrt64/share/qt6/plugins/platforms/qwindows.dll platforms/ 2>/dev/null || true
          cp -n /ucrt64/share/qt6/plugins/styles/qwindowsvistastyle.dll styles/ 2>/dev/null || true

          # Clean up only build files, keep all runtime DLLs
          rm -f dddconv.exe dddutil.exe CMakeCache.txt Makefile cmake_install.cmake 2>/dev/null || true

          echo "=== Final folder contents ==="
          ls -la

          echo "Executable size:"
          ls -lh DomesdayDuplicator.exe

          # Create zip
          zip -9 -r ../DomesdayDuplicator-Windows.zip ./*

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DomesdayDuplicator-Windows-ZIP
          path: DomesdayDuplicator-Windows.zip
          retention-days: 7
