name: Windows + macOS Build & Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-qt6-serialport
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-flac
            zip
            make

      - name: Build & Package
        shell: msys2 {0}
        run: |
          mkdir -p build && cd build

          cmake .. -G "MSYS Makefiles" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++ \
              -Wl,-Bstatic -lwinpthread -lusb-1.0 -lz -lbcrypt -lws2_32 -liphlpapi \
              -ladvapi32 -luser32 -lgdi32 -lshell32 -lwinmm -lole32 -lsetupapi \
              -Wl,-Bdynamic" \
            -DCMAKE_CXX_FLAGS="-static-libgcc -static-libstdc++" \
            -DCMAKE_C_FLAGS="-static-libgcc"

          make -j$(nproc)

          # Copy executables
          cp "$(find . -name "DomesdayDuplicator.exe" | head -n1)" DomesdayDuplicator.exe || true
          cp "$(find . -name "dddconv.exe" | head -n1)" dddconv.exe || true
          cp "$(find . -name "dddutil.exe" | head -n1)" dddutil.exe || true

          # Deploy Qt
          windeployqt6 --release --no-translations --no-opengl-sw --no-system-d3d-compiler DomesdayDuplicator.exe

          # Collect DLLs for all executables (app + ffmpeg + flac)
          for exe in DomesdayDuplicator.exe /ucrt64/bin/ffmpeg.exe /ucrt64/bin/flac.exe; do
            ldd "$exe" | grep -E '/ucrt64/' | awk '{print $3}' | xargs -I {} cp -n "{}" . 2>/dev/null || true
          done

          # Critical DLLs
          cp -n /ucrt64/bin/libgcc_s_seh-1.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libzstd.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libbrotlidec.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libbrotlicommon.dll . 2>/dev/null || true

          # FFmpeg DLLs (lib-prefixed in MSYS2 UCRT64)
          cp -n /ucrt64/bin/libavutil-*.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libavcodec-*.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libavformat-*.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libavfilter-*.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libswresample-*.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libswscale-*.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libsoxr-0.dll . 2>/dev/null || true

          # ffmpeg and flac executables (needed for 8-bit FLAC on-the-fly capture)
          cp -n /ucrt64/bin/ffmpeg.exe . 2>/dev/null || true
          cp -n /ucrt64/bin/flac.exe . 2>/dev/null || true

          # Qt plugins
          mkdir -p platforms styles
          cp -n /ucrt64/share/qt6/plugins/platforms/qwindows.dll platforms/ 2>/dev/null || true
          cp -n /ucrt64/share/qt6/plugins/styles/qwindowsvistastyle.dll styles/ 2>/dev/null || true

          rm -f zlib1.dll 2>/dev/null || true

          find . -maxdepth 1 -type f ! -name "*.exe" ! -name "*.dll" -delete
          find . -maxdepth 1 -type d ! -name "." ! -name "platforms" ! -name "styles" -exec rm -rf {} +

          # Include GNURadio HiFi scripts
          cp -r ../GNURadio-Scripts ./GNURadio-Scripts

          echo "=== VERIFY FFMPEG RUNS ==="
          ./ffmpeg.exe -version || echo "WARNING: ffmpeg.exe failed to run - check DLLs!"
          echo "=== VERIFY FLAC RUNS ==="
          ./flac.exe --version || echo "WARNING: flac.exe failed to run - check DLLs!"

          echo "=== FINAL CONTENTS ==="
          ls -la

          # Create zip one level up (avoids $GITHUB_WORKSPACE path issues in MSYS2)
          zip -9 -r "../DomesdayDuplicator_Flac+DownSampling.zip" ./*
          ls -lh "../DomesdayDuplicator_Flac+DownSampling.zip"

      - name: Upload artifact (all builds)
        uses: actions/upload-artifact@v4
        with:
          name: DomesdayDuplicator-Windows
          path: build/
          retention-days: 30

      - name: Create Release (Windows)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: DomesdayDuplicator_Flac+DownSampling.zip
          name: DomesdayDuplicator_Flac+DownSampling ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest  # ARM (Apple Silicon); runs on Intel Macs via Rosetta 2
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake qt6 libusb ffmpeg flac brotli webp

      - name: Build & Package
        run: |
          mkdir -p build && cd build

          # Tell pkg-config where Homebrew's ffmpeg and libusb libraries are
          export PKG_CONFIG_PATH="$(brew --prefix ffmpeg)/lib/pkgconfig:$(brew --prefix libusb)/lib/pkgconfig:$PKG_CONFIG_PATH"

          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt6)" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

          make -j$(sysctl -n hw.logicalcpu)

          # Deploy Qt into the app bundle (no -dmg yet — we sign first)
          $(brew --prefix qt6)/bin/macdeployqt6 DomesdayDuplicator/DomesdayDuplicator.app

          # macdeployqt6 may leave some bundled dylibs without a valid signature.
          # Force ad-hoc re-sign of every library and then the whole app bundle.
          find DomesdayDuplicator/DomesdayDuplicator.app \
               \( -name "*.dylib" -o -name "*.so" \) \
               -exec codesign --force --sign - {} \; 2>/dev/null || true
          codesign --force --deep --sign - DomesdayDuplicator/DomesdayDuplicator.app 2>/dev/null || true

          # Build the DMG from the signed app bundle
          hdiutil create -volname DomesdayDuplicator \
            -srcfolder DomesdayDuplicator/DomesdayDuplicator.app \
            -ov -format UDZO ../DomesdayDuplicator_macOS.dmg

          echo "=== FINAL CONTENTS ==="
          ls -lh ../DomesdayDuplicator_macOS.dmg

      - name: Upload artifact (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: DomesdayDuplicator-macOS
          path: DomesdayDuplicator_macOS.dmg
          retention-days: 30

      - name: Create Release (macOS)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: DomesdayDuplicator_macOS.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
