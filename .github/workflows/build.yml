name: Windows + macOS Build & Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-qt6-serialport
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-flac
            zip
            make

      - name: Build & Package
        shell: msys2 {0}
        run: |
          mkdir -p build && cd build

          cmake .. -G "MSYS Makefiles" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++ \
              -Wl,-Bstatic -lwinpthread -lusb-1.0 -lz -lbcrypt -lws2_32 -liphlpapi \
              -ladvapi32 -luser32 -lgdi32 -lshell32 -lwinmm -lole32 -lsetupapi \
              -Wl,-Bdynamic" \
            -DCMAKE_CXX_FLAGS="-static-libgcc -static-libstdc++" \
            -DCMAKE_C_FLAGS="-static-libgcc"

          make -j$(nproc)

          # Copy executables
          cp "$(find . -name "DomesdayDuplicator.exe" | head -n1)" DomesdayDuplicator.exe || true
          cp "$(find . -name "dddconv.exe" | head -n1)" dddconv.exe || true
          cp "$(find . -name "dddutil.exe" | head -n1)" dddutil.exe || true

          # Deploy Qt
          windeployqt6 --release --no-translations --no-opengl-sw --no-system-d3d-compiler DomesdayDuplicator.exe

          # Collect DLLs for all executables (app + ffmpeg + flac)
          for exe in DomesdayDuplicator.exe /ucrt64/bin/ffmpeg.exe /ucrt64/bin/flac.exe; do
            ldd "$exe" | grep -E '/ucrt64/' | awk '{print $3}' | xargs -I {} cp -n "{}" . 2>/dev/null || true
          done

          # Critical DLLs
          cp -n /ucrt64/bin/libgcc_s_seh-1.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libzstd.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libbrotlidec.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libbrotlicommon.dll . 2>/dev/null || true

          # FFmpeg DLLs (lib-prefixed in MSYS2 UCRT64)
          cp -n /ucrt64/bin/libavutil-*.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libavcodec-*.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libavformat-*.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libavfilter-*.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libswresample-*.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libswscale-*.dll . 2>/dev/null || true
          cp -n /ucrt64/bin/libsoxr-0.dll . 2>/dev/null || true

          # ffmpeg and flac executables (needed for 8-bit FLAC on-the-fly capture)
          cp -n /ucrt64/bin/ffmpeg.exe . 2>/dev/null || true
          cp -n /ucrt64/bin/flac.exe . 2>/dev/null || true

          # Qt plugins
          mkdir -p platforms styles
          cp -n /ucrt64/share/qt6/plugins/platforms/qwindows.dll platforms/ 2>/dev/null || true
          cp -n /ucrt64/share/qt6/plugins/styles/qwindowsvistastyle.dll styles/ 2>/dev/null || true

          rm -f zlib1.dll 2>/dev/null || true

          # Remove Qt plugins we don't use.
          # qtuiotouchplugin (touch input) drags in Qt6Network — remove the plugin dirs and Qt6Network itself.
          # Keep the TLS/crypto DLLs (libcrypto, libgnutls, etc.) — ffmpeg needs them for network streams.
          rm -rf generic networkinformation tls 2>/dev/null || true
          rm -f Qt6Network.dll libssl-3-x64.dll 2>/dev/null || true

          find . -maxdepth 1 -type f ! -name "*.exe" ! -name "*.dll" -delete
          find . -maxdepth 1 -type d ! -name "." ! -name "platforms" ! -name "styles" -exec rm -rf {} +

          # Include GNURadio HiFi scripts
          cp -r ../GNURadio-Scripts ./GNURadio-Scripts

          echo "=== VERIFY FFMPEG RUNS ==="
          ./ffmpeg.exe -version || echo "WARNING: ffmpeg.exe failed to run - check DLLs!"
          echo "=== VERIFY FLAC RUNS ==="
          ./flac.exe --version || echo "WARNING: flac.exe failed to run - check DLLs!"

          # Strip debug symbols from all DLLs and EXEs to reduce package size.
          # --strip-unneeded removes debug/symbol tables while keeping exports intact.
          strip --strip-unneeded *.exe *.dll platforms/*.dll styles/*.dll 2>/dev/null || true

          echo "=== FINAL CONTENTS ==="
          du -sh . && ls -lh *.exe *.dll 2>/dev/null | sort -k5 -rh | head -20

          # Create zip one level up (avoids $GITHUB_WORKSPACE path issues in MSYS2)
          zip -9 -r "../DomesdayDuplicator_Flac+DownSampling.zip" ./*
          ls -lh "../DomesdayDuplicator_Flac+DownSampling.zip"

      - name: Upload artifact (all builds)
        uses: actions/upload-artifact@v4
        with:
          name: DomesdayDuplicator-Windows
          path: build/
          retention-days: 30

      - name: Create Release (Windows)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: DomesdayDuplicator_Flac+DownSampling.zip
          name: DomesdayDuplicator_Flac+DownSampling ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-15-intel  # Intel x86_64 Mac
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt 6.5 LTS (macOS 11+ compatible) via aqtinstall
        run: |
          pip3 install aqtinstall --break-system-packages
          # Qt 6.5 LTS is the last series with macOS 11 (Big Sur) as minimum target.
          # Homebrew's qt6 (6.11+) requires macOS 14, so we use aqtinstall instead.
          aqt install-qt mac desktop 6.5.3 clang_64 --outputdir ~/Qt -m qtserialport
          echo "QT_ROOT=$HOME/Qt/6.5.3/macos" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          brew install cmake libusb flac brotli webp libsoxr
          # Note: ffmpeg is NOT installed from Homebrew — Homebrew's ffmpeg targets macOS 14.
          # We build it from source with deployment target 11.0 below.

      - name: Cache ffmpeg (macOS 11 compatible)
        uses: actions/cache@v4
        id: ffmpeg-cache
        with:
          path: ~/ffmpeg-compat
          key: ffmpeg-7.1-macos11-x86_64-v3

      - name: Build ffmpeg 7.1 with macOS 11 deployment target
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch n7.1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg-src
          cd /tmp/ffmpeg-src
          export MACOSX_DEPLOYMENT_TARGET=11.0
          # Build shared libs (libavutil + libswresample) for our C++ app to link against,
          # plus avcodec/avformat/avfilter and the ffmpeg binary for on-the-fly FLAC capture.
          # --enable-libsoxr gives high-quality resampling via resampler=soxr in the pipeline.
          ./configure \
            --prefix=$HOME/ffmpeg-compat \
            --enable-shared --disable-static \
            --disable-doc --disable-network \
            --disable-swscale --disable-postproc \
            --enable-avutil --enable-swresample \
            --enable-avcodec --enable-avformat --enable-avfilter \
            --enable-ffmpeg --disable-ffplay --disable-ffprobe \
            --enable-protocol=pipe \
            --disable-decoders --enable-decoder=pcm_s16le \
            --disable-encoders --enable-encoder=pcm_u8 \
            --disable-demuxers --enable-demuxer=pcm_s16le \
            --disable-muxers   --enable-muxer=pcm_u8 \
            --disable-filters  --enable-filter=aresample \
            --enable-libsoxr \
            --extra-cflags="-mmacosx-version-min=11.0 -I$(brew --prefix libsoxr)/include" \
            --extra-ldflags="-mmacosx-version-min=11.0 -L$(brew --prefix libsoxr)/lib" \
            --disable-x86asm
          make -j$(sysctl -n hw.logicalcpu)
          make install

      - name: Build & Package
        run: |
          mkdir -p build && cd build

          # Use our macOS 11 compatible ffmpeg, and Homebrew for libusb
          export PKG_CONFIG_PATH="$HOME/ffmpeg-compat/lib/pkgconfig:$(brew --prefix libusb)/lib/pkgconfig:$PKG_CONFIG_PATH"

          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

          make -j$(sysctl -n hw.logicalcpu)

          # Deploy Qt into the app bundle (no -dmg yet — we sign first).
          # macdeployqt may print rpath errors for optional Qt modules — harmless, use || true.
          $QT_ROOT/bin/macdeployqt DomesdayDuplicator/DomesdayDuplicator.app || true

          APP_FW="DomesdayDuplicator/DomesdayDuplicator.app/Contents/Frameworks"
          APP_MACOS="DomesdayDuplicator/DomesdayDuplicator.app/Contents/MacOS"

          # Copy ALL ffmpeg shared libs from our macOS 11 build into Frameworks/,
          # fix each lib's install name and any cross-references to other ffmpeg libs.
          for lib_path in $HOME/ffmpeg-compat/lib/*.dylib; do
            lib=$(basename "$lib_path")
            cp -f "$lib_path" "$APP_FW/$lib" 2>/dev/null || true
            install_name_tool -id "@rpath/$lib" "$APP_FW/$lib" 2>/dev/null || true
            # Fix cross-references between ffmpeg dylibs
            for dep in $(otool -L "$APP_FW/$lib" 2>/dev/null | grep ffmpeg-compat | awk '{print $1}'); do
              dep_base=$(basename "$dep")
              install_name_tool -change "$dep" "@rpath/$dep_base" "$APP_FW/$lib" 2>/dev/null || true
            done
            # Fix soxr dependency path
            for dep in $(otool -L "$APP_FW/$lib" 2>/dev/null | grep soxr | awk '{print $1}'); do
              dep_base=$(basename "$dep")
              cp -n "$(brew --prefix libsoxr)/lib/$dep_base" "$APP_FW/" 2>/dev/null || true
              install_name_tool -change "$dep" "@rpath/$dep_base" "$APP_FW/$lib" 2>/dev/null || true
            done
          done
          # Fix soxr's own install name if we copied it
          for lib in "$APP_FW"/libsoxr*.dylib; do
            [ -f "$lib" ] && install_name_tool -id "@rpath/$(basename $lib)" "$lib" 2>/dev/null || true
          done

          # Bundle the ffmpeg binary for on-the-fly FLAC capture.
          # The app looks for it in Contents/MacOS/ (next to the main executable).
          if [ -f "$HOME/ffmpeg-compat/bin/ffmpeg" ]; then
            cp "$HOME/ffmpeg-compat/bin/ffmpeg" "$APP_MACOS/"
            # Fix the ffmpeg binary's load commands to find dylibs in ../Frameworks/
            install_name_tool -add_rpath "@executable_path/../Frameworks" "$APP_MACOS/ffmpeg" 2>/dev/null || true
            for dep in $(otool -L "$APP_MACOS/ffmpeg" 2>/dev/null | grep ffmpeg-compat | awk '{print $1}'); do
              dep_base=$(basename "$dep")
              install_name_tool -change "$dep" "@rpath/$dep_base" "$APP_MACOS/ffmpeg" 2>/dev/null || true
            done
            for dep in $(otool -L "$APP_MACOS/ffmpeg" 2>/dev/null | grep soxr | awk '{print $1}'); do
              dep_base=$(basename "$dep")
              install_name_tool -change "$dep" "@rpath/$dep_base" "$APP_MACOS/ffmpeg" 2>/dev/null || true
            done
            strip "$APP_MACOS/ffmpeg" 2>/dev/null || true
            echo "=== ffmpeg binary bundled ==="
            "$APP_MACOS/ffmpeg" -version 2>&1 | head -3 || echo "WARNING: bundled ffmpeg failed to run"
          else
            echo "WARNING: ffmpeg binary not found at $HOME/ffmpeg-compat/bin/ffmpeg"
          fi

          # Bundle the flac binary (Homebrew's flac works fine on Big Sur for our pipeline).
          FLAC_BIN="$(brew --prefix flac)/bin/flac"
          if [ -f "$FLAC_BIN" ]; then
            cp "$FLAC_BIN" "$APP_MACOS/"
            strip "$APP_MACOS/flac" 2>/dev/null || true
            echo "=== flac binary bundled ==="
            "$APP_MACOS/flac" --version || echo "WARNING: bundled flac failed to run"
          fi

          # Copy indirect dylib dependencies that macdeployqt fails to resolve
          # (libwebp/libsharpyuv pulled in by Qt image plugins, libbrotlicommon by freetype).
          for lib in \
              "$(brew --prefix webp)/lib/libwebp.7.dylib" \
              "$(brew --prefix webp)/lib/libsharpyuv.0.dylib" \
              "$(brew --prefix brotli)/lib/libbrotlicommon.1.dylib"; do
            [ -f "$lib" ] && cp -n "$lib" "$APP_FW/" 2>/dev/null || true
          done
          # Fix install names so the copied libs are self-contained inside the bundle
          for lib in libwebp.7.dylib libsharpyuv.0.dylib libbrotlicommon.1.dylib; do
            [ -f "$APP_FW/$lib" ] && \
              install_name_tool -id "@rpath/$lib" "$APP_FW/$lib" 2>/dev/null || true
          done

          # macdeployqt may leave some bundled dylibs without a valid signature.
          # Force ad-hoc re-sign of every library and then the whole app bundle.
          find DomesdayDuplicator/DomesdayDuplicator.app \
               \( -name "*.dylib" -o -name "*.so" \) \
               -exec codesign --force --sign - {} \; 2>/dev/null || true
          # Re-sign the ffmpeg and flac binaries we added
          codesign --force --sign - "$APP_MACOS/ffmpeg" 2>/dev/null || true
          codesign --force --sign - "$APP_MACOS/flac"   2>/dev/null || true
          codesign --force --deep --sign - DomesdayDuplicator/DomesdayDuplicator.app 2>/dev/null || true

          # Build the DMG from the signed app bundle
          hdiutil create -volname DomesdayDuplicator \
            -srcfolder DomesdayDuplicator/DomesdayDuplicator.app \
            -ov -format UDZO ../DomesdayDuplicator_macOS.dmg

          echo "=== FINAL CONTENTS ==="
          ls -lh ../DomesdayDuplicator_macOS.dmg

      - name: Upload artifact (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: DomesdayDuplicator-macOS
          path: DomesdayDuplicator_macOS.dmg
          retention-days: 30

      - name: Create Release (macOS)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: DomesdayDuplicator_macOS.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
